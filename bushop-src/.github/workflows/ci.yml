# bushop/.github/workflows/ci.yml
# CI workflow for bushop (Next.js) repo
name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  ci:
    name: Lint, Type-check & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Run TypeScript type-check
        run: npx tsc --noEmit

      - name: Run tests with coverage
        run: npm run test:ci

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fe-coverage-${{ github.run_number }}
          path: coverage/
          retention-days: 30

      - name: Build production
        run: npm run build
        env:
          SCRAPER_API_URL: http://localhost:8000
          INTERNAL_API_KEY: ci-placeholder-key
          NEXT_PUBLIC_BASE_URL: http://localhost:3000
